<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import Archive | Cactus Learning Portal</title>
    <link rel="stylesheet" href="../styles/mystyle2.css">
    <link rel="stylesheet" href="../styles/teacher_panel.css">
</head>
<body>
    <div id="nav-placeholder"></div>

    <main class="admin-dashboard">
        <div class="admin-header">
            <h2>📦 Database Importer</h2>
            <a href="techer_panel.html" class="btn-back">← Back to Main Dashboard</a>
        </div>

        <div class="admin-card">
            <h3>Upload Botanical Archive (CSV)</h3>
            <p>Upload your latest spreadsheet to instantly update the SQLite database. Ensure your columns match the required format.</p>
            
            <form id="csv-upload-form">
                <div class="file-drop-area">
                    <span class="drop-icon">📄</span>
                    <input type="file" id="csv-input" name="csvFile" accept=".csv" required>
                </div>
                <button type="submit" class="btn-primary" id="upload-btn">Import Data</button>
            </form>
            
            <div id="upload-status"></div>
        </div>
    </main>

    <script src="../JS/nav.js"></script>
    <script src="../JS/import.js"></script>
</body>
</html>
