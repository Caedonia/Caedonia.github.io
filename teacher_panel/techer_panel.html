<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/teacher_panel.css">
    <link rel="stylesheet" href="../styles/mystyle2.css">
</head>
<div class="admin-container">
    <aside class="admin-sidebar">
        <div id="global-nav"></div>
    </aside>

    <main class="admin-main">
    <header class="admin-header">
        <h1>Teacher Panel</h1>
        <p>Changes made here will update the student view.</p>
        
        <!-- The Taproot: Global Sprout Selector -->
        <div class="global-controls">
            <label for="global_sprout">Active Sprout:</label>
            <select id="global_sprout" class="cacti-input">
                <option value="">Select a student...</option>
                <!-- These will eventually be populated dynamically from Supabase profiles -->
                <option value="uuid_1">Cultivator</option>
                <option value="uuid_2">Sprout</option>
            </select>
        </div>
    </header>

    <div class="admin-grid">
        <section class="admin-card">
            <h3>Assign New Homework</h3>
            <!-- Notice the redundant select is gone -->
            <form id="admin-homework-form">
                <input type="text" class="cacti-input" placeholder="Task Name (e.g., Reading p.20)" required>
                <input type="date" class="cacti-input" required>
                <button type="submit" class="admin-btn">Add Task</button>
            </form>
        </section>

        <section class="admin-card">
            <h3>Lesson Summary</h3>
            <!-- Cleaned form -->
            <form id="admin-summary-form">
                <input type="text" class="cacti-input" placeholder="Lesson Topic" required>
                <textarea class="cacti-input" placeholder="What did we cover today?" rows="4" required></textarea>
                <button type="submit" class="admin-btn">Update Summary</button>
            </form>
        </section>
        
        <!-- Recent posts remains full width -->
        <section class="admin-card full-width">
            <h3>Recent Posts</h3>
            <!-- Table content remains as you had it -->
        </section>
    </div>
</main>
        <div class="admin-card">
    <h3>📦 Bulk Data Import</h3>
    <p>Update your data quickly by uploading your latest CSV spreadsheet.</p>
    <a href="../teacher_panel/import.html" class="btn-primary" style="display: inline-block; text-align: center; text-decoration: none; box-sizing: border-box;">
        Open Importer →
    </a>
</div>
    </main>
</div>
<script src="../JS/nav.js"></script>
<script src="../JS/teacher_panel.js"></script>
