<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cactus Learning | Home</title>
    <link rel="stylesheet" href="../styles/mystyle2.css">
    <link rel="stylesheet" href="../styles/actual_cacti_fn.css">

</head>
<div class="search-container">
    <header class="search-header">
        <a href="../landing_page.html" class="back-btn">← Back</a>
        <h1>🌵 Cactus Archive</h1>
        <p>Search the global field database</p>
    </header>

    <section class="filter-panel">
        <div class="filter-grid">
            <div class="filter-group">
                <label>Field Number</label>
                <input type="text" id="filter-fn" placeholder="e.g. L 450">
            </div>
            <div class="filter-group">
                <label>Genus</label>
                <input type="text" id="filter-genus" placeholder="e.g. Mammillaria">
            </div>
            <div class="filter-group">
                <label>Species Name</label>
                <input type="text" id="filter-species" placeholder="e.g. Elongata">
            </div>
            <div class="filter-group">
                <label>Country of Origin</label>
                <select id="filter-origin">
                    <option value="">All Countries</option>
                    <option value="mexico">Mexico</option>
                    <option value="bolivia">Bolivia</option>
                    <option value="usa">USA</option>
                </select>
            </div>
        </div>
        <button id="search-btn" class="search-trigger">Filter Results</button>
    </section>

    <div class="results-info" id="results-count">Showing 0 results found in the archive</div>
    <main class="results-grid" id="cactus-grid">
        </main>
</div>

<script src="../JS/search_cati.js"></script>
