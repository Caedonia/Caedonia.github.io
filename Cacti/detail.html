<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Profile | Cactus Learning Portal</title>
    <link rel="stylesheet" href="../styles/mystyle2.css">
    <link rel="stylesheet" href="../styles/detail.css">
</head>
<body>
    <div id="nav-placeholder"></div>

    <main class="profile-container">
        <a href="start.html" class="btn-back">← Back to Archive</a>

        <div class="profile-card">
            <div class="profile-header">
                <div class="header-text">
                    <h1 id="detail-title">Loading Plant...</h1>
                    <span class="badge" id="detail-fn">FN ---</span>
                </div>
                <div class="profile-image-placeholder">
                    🌵
                </div>
            </div>

            <div class="data-grid">
                <div class="data-card">
                    <span class="data-label">Origin Country</span>
                    <strong class="data-value" id="detail-origin">Loading...</strong>
                </div>
                <div class="data-card">
                    <span class="data-label">Exact Location</span>
                    <strong class="data-value" id="detail-location">Loading...</strong>
                </div>
            </div>

            <div class="content-section">
                <h3>Botanical Description & Status</h3>
                <p id="detail-desc" class="desc-text">Loading description...</p>
            </div>

            <div class="notes-section">
                <h3>📝 Collector's Notes</h3>
                <p id="detail-notes" class="notes-text">Loading notes...</p>
            </div>
        </div>
    </main>


    <script src="../JS/nav.js"></script>
    <script type="module" src="../JS/detail.js"></script>
</body>
</html>
